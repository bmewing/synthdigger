<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a0f52"/>
      <stop offset="100%" stop-color="#0b0221"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd23f"/>
      <stop offset="35%" stop-color="#ff9d3f"/>
      <stop offset="65%" stop-color="#ff2e97"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </linearGradient>
    <mask id="stripes">
      <rect x="0" y="0" width="64" height="64" fill="#fff"/>
      <rect x="0" y="36" width="64" height="2.6" fill="#000"/>
      <rect x="0" y="41.6" width="64" height="3" fill="#000"/>
      <rect x="0" y="47.8" width="64" height="3.6" fill="#000"/>
      <rect x="0" y="54.6" width="64" height="4.4" fill="#000"/>
    </mask>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="13" fill="url(#bg)"/>

  <g mask="url(#stripes)">
    <circle cx="32" cy="33" r="21" fill="url(#sun)"/>
  </g>

  <g filter="url(#glow)" fill="#f4f1fa" stroke="#ff2e97" stroke-width="1.4" stroke-linejoin="round">
    <path d="M 24.9 16.2 L 41.8 12.8 L 41.8 19.4 L 24.9 22.8 Z"/>
    <rect x="24.9" y="20.6" width="2.6" height="23"/>
    <rect x="39.2" y="17.2" width="2.6" height="23"/>
    <ellipse cx="23" cy="44" rx="4.7" ry="3.5" transform="rotate(-18 23 44)"/>
    <ellipse cx="37.3" cy="40.7" rx="4.7" ry="3.5" transform="rotate(-18 37.3 40.7)"/>
  </g>
</svg>
